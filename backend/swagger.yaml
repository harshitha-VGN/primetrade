openapi: 3.0.0
info:
  title: PrimeTrade Assignment API
  version: 1.0.0
  description: REST API with JWT Auth & Role-Based Access

servers:
  - url: http://localhost:5050/api/v1

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

paths:
  /auth/register:
    post:
      summary: Register a new user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name:
                  type: string
                email:
                  type: string
                password:
                  type: string
      responses:
        '201':
          description: User created
        '409':
          description: Email already exists

  /auth/login:
    post:
      summary: Login
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: JWT token returned

  /auth/me:
    get:
      summary: Get current user
      tags: [Auth]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Authenticated user info

  /auth/users:
    get:
      summary: Get all users (Admin only)
      tags: [Auth]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of users

  /tasks:
    get:
      summary: Get my tasks
      tags: [Tasks]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of tasks
    post:
      summary: Create a task
      tags: [Tasks]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title:
                  type: string
                description:
                  type: string
                status:
                  type: string
                  enum: [pending, in_progress, completed]
      responses:
        '201':
          description: Task created

  /tasks/all:
    get:
      summary: Get all tasks (Admin only)
      tags: [Tasks]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: All tasks

  /tasks/{id}:
    put:
      summary: Update a task
      tags: [Tasks]
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
                status:
                  type: string
      responses:
        '200':
          description: Task updated
    delete:
      summary: Delete a task
      tags: [Tasks]
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Task deleted