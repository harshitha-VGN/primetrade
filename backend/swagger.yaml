openapi: 3.0.0
info:
  title: PrimeTrade Assignment API
  version: 1.0.0
  description: REST API with JWT Auth & Role-Based Access Control

servers:
  - url: http://localhost:5050/api/v1

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        _id: { type: string }
        name: { type: string }
        email: { type: string }
        role: { type: string, enum: [user, admin] }
        createdAt: { type: string, format: date-time }

    Task:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
        description: { type: string }
        status: { type: string, enum: [pending, in_progress, completed] }
        user: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    ApiSuccess:
      type: object
      properties:
        status: { type: string, example: success }
        message: { type: string }
        data: { type: object }

    ApiError:
      type: object
      properties:
        status: { type: string, example: error }
        message: { type: string }

paths:
  # ── Auth ──────────────────────────────────────────────────────────────────

  /auth/register:
    post:
      summary: Register a new user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name: { type: string, example: Jane Doe }
                email: { type: string, example: jane@example.com }
                password: { type: string, minLength: 6, example: secret123 }
                adminSecret: { type: string, example: primetrade@admin123, description: Optional. Grants admin role if correct. }
      responses:
        '201':
          description: User registered
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiSuccess' }
        '409':
          description: Email already exists
        '422':
          description: Validation error

  /auth/login:
    post:
      summary: Login and receive JWT
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, example: jane@example.com }
                password: { type: string, example: secret123 }
      responses:
        '200':
          description: JWT token + user info
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          token: { type: string }
                          user: { $ref: '#/components/schemas/User' }
        '401':
          description: Invalid credentials

  /auth/me:
    get:
      summary: Get current authenticated user
      tags: [Auth]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: User info from JWT
        '401':
          description: No/invalid token

  # ── Tasks (user scope) ───────────────────────────────────────────────────

  /tasks:
    get:
      summary: Get my tasks
      tags: [Tasks]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Array of tasks belonging to the current user
    post:
      summary: Create a task
      tags: [Tasks]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title: { type: string }
                description: { type: string }
                status: { type: string, enum: [pending, in_progress, completed] }
      responses:
        '201':
          description: Task created

  /tasks/{id}:
    put:
      summary: Update a task (owner or admin)
      tags: [Tasks]
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                description: { type: string }
                status: { type: string, enum: [pending, in_progress, completed] }
      responses:
        '200':
          description: Task updated
        '403':
          description: Not the owner and not admin
        '404':
          description: Task not found
    delete:
      summary: Delete a task (owner or admin)
      tags: [Tasks]
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Task deleted

  # ── Admin ─────────────────────────────────────────────────────────────────

  /admin/stats:
    get:
      summary: Platform statistics (admin only)
      tags: [Admin]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: User and task counts
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          users:
                            type: object
                            properties:
                              total: { type: integer }
                              regular: { type: integer }
                              admins: { type: integer }
                          tasks:
                            type: object
                            properties:
                              total: { type: integer }
                              pending: { type: integer }
                              in_progress: { type: integer }
                              completed: { type: integer }
        '403':
          description: Admin access required

  /admin/users:
    get:
      summary: List all users with filters (admin only)
      tags: [Admin]
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: search
          schema: { type: string }
          description: Search by name or email
        - in: query
          name: role
          schema: { type: string, enum: [user, admin] }
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
      responses:
        '200':
          description: Paginated user list
        '403':
          description: Admin access required

  /admin/users/{id}/promote:
    patch:
      summary: Promote a user to admin (admin only)
      tags: [Admin]
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: User promoted
        '400':
          description: Cannot change your own role
        '404':
          description: User not found

  /admin/users/{id}/demote:
    patch:
      summary: Demote an admin back to user (admin only)
      tags: [Admin]
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: User demoted
        '400':
          description: Cannot demote yourself

  /admin/users/{id}:
    delete:
      summary: Delete a user and all their tasks (admin only)
      tags: [Admin]
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: User deleted
        '400':
          description: Cannot delete your own account
        '404':
          description: User not found

  /admin/tasks:
    get:
      summary: List all tasks with filters (admin only)
      tags: [Admin]
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: status
          schema: { type: string, enum: [pending, in_progress, completed] }
        - in: query
          name: userId
          schema: { type: string }
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
      responses:
        '200':
          description: Paginated task list

  /admin/tasks/{id}:
    delete:
      summary: Force-delete any task (admin only)
      tags: [Admin]
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Task deleted
        '404':
          description: Task not found